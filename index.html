<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Arial', sans-serif;
        }

        .container {
            text-align: center;
        }

        h1 {
            color: white;
            margin-bottom: 20px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .game-wrapper {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        canvas {
            background-color: #1a1a1a;
            border: 3px solid #667eea;
            display: block;
            margin: 0 auto 20px;
            border-radius: 5px;
        }

        .info {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            color: #333;
            font-size: 1.2em;
        }

        .info div {
            background: #f0f0f0;
            padding: 10px 20px;
            border-radius: 5px;
            font-weight: bold;
        }

        .controls {
            margin-bottom: 20px;
            color: #555;
        }

        .controls p {
            margin: 5px 0;
        }

        .buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            padding: 10px 20px;
            font-size: 1em;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
            font-weight: bold;
        }

        button:hover {
            background: #764ba2;
        }

        button:active {
            transform: scale(0.98);
        }

        .game-over {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            text-align: center;
            z-index: 1000;
        }

        .game-over.show {
            display: block;
            animation: popIn 0.3s ease-out;
        }

        @keyframes popIn {
            0% {
                transform: translate(-50%, -50%) scale(0.5);
                opacity: 0;
            }
            100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 1;
            }
        }

        .game-over h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 2em;
        }

        .game-over p {
            color: #555;
            margin: 10px 0;
            font-size: 1.2em;
        }

        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 999;
        }

        .overlay.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🐍 Snake Game</h1>
        <div class="game-wrapper">
            <div class="info">
                <div>Score: <span id="score">0</span></div>
                <div>High Score: <span id="highScore">0</span></div>
            </div>
            <canvas id="gameCanvas" width="400" height="400"></canvas>
            <div class="controls">
                <p>Use <strong>Arrow Keys</strong> or <strong>WASD</strong> to move</p>
                <p>Eat the red food to grow and earn points</p>
            </div>
            <div class="buttons">
                <button onclick="startGame()">Start Game</button>
                <button onclick="pauseGame()">Pause</button>
                <button onclick="resetGame()">Reset</button>
            </div>
        </div>
    </div>

    <div class="overlay" id="overlay"></div>
    <div class="game-over" id="gameOverModal">
        <h2>Game Over! 💀</h2>
        <p>Your Score: <span id="finalScore">0</span></p>
        <p>High Score: <span id="finalHighScore">0</span></p>
        <button onclick="startGame()" style="margin-top: 20px;">Play Again</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('score');
        const highScoreDisplay = document.getElementById('highScore');
        const gameOverModal = document.getElementById('gameOverModal');
        const overlay = document.getElementById('overlay');

        // Game variables
        const gridSize = 20;
        let snake = [{x: 10, y: 10}];
        let food = {x: 15, y: 15};
        let direction = {x: 1, y: 0};
        let nextDirection = {x: 1, y: 0};
        let score = 0;
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        let gameActive = false;
        let gamePaused = false;
        let gameLoop;

        highScoreDisplay.textContent = highScore;

        // Draw functions
        function drawCell(x, y, color) {
            ctx.fillStyle = color;
            ctx.fillRect(x * gridSize, y * gridSize, gridSize - 2, gridSize - 2);
        }

        function draw() {
            // Clear canvas
            ctx.fillStyle = '#1a1a1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw snake
            snake.forEach((segment, index) => {
                if (index === 0) {
                    drawCell(segment.x, segment.y, '#00ff00');
                } else {
                    drawCell(segment.x, segment.y, '#00cc00');
                }
            });

            // Draw food
            drawCell(food.x, food.y, '#ff0000');
        }

        function update() {
            if (!gameActive || gamePaused) return;

            direction = nextDirection;

            // Calculate new head
            const head = {x: snake[0].x + direction.x, y: snake[0].y + direction.y};

            // Check wall collision
            if (head.x < 0 || head.x >= 20 || head.y < 0 || head.y >= 20) {
                endGame();
                return;
            }

            // Check self collision
            if (snake.some(segment => segment.x === head.x && segment.y === head.y)) {
                endGame();
                return;
            }

            snake.unshift(head);

            // Check food collision
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreDisplay.textContent = score;
                generateFood();
            } else {
                snake.pop();
            }
        }

        function generateFood() {
            let newFood;
            do {
                newFood = {
                    x: Math.floor(Math.random() * 20),
                    y: Math.floor(Math.random() * 20)
                };
            } while (snake.some(segment => segment.x === newFood.x && segment.y === newFood.y));
            food = newFood;
        }

        function gameUpdateLoop() {
            update();
            draw();
        }

        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            if (!gameActive) return;

            switch(e.key.toLowerCase()) {
                case 'arrowup':
                case 'w':
                    if (direction.y === 0) nextDirection = {x: 0, y: -1};
                    e.preventDefault();
                    break;
                case 'arrowdown':
                case 's':
                    if (direction.y === 0) nextDirection = {x: 0, y: 1};
                    e.preventDefault();
                    break;
                case 'arrowleft':
                case 'a':
                    if (direction.x === 0) nextDirection = {x: -1, y: 0};
                    e.preventDefault();
                    break;
                case 'arrowright':
                case 'd':
                    if (direction.x === 0) nextDirection = {x: 1, y: 0};
                    e.preventDefault();
                    break;
            }
        });

        function startGame() {
            gameActive = true;
            gamePaused = false;
            gameOverModal.classList.remove('show');
            overlay.classList.remove('show');
            clearInterval(gameLoop);
            gameLoop = setInterval(gameUpdateLoop, 100);
            draw();
        }

        function pauseGame() {
            if (!gameActive) return;
            gamePaused = !gamePaused;
            document.querySelector('button:nth-of-type(2)').textContent = gamePaused ? 'Resume' : 'Pause';
        }

        function resetGame() {
            gameActive = false;
            gamePaused = false;
            snake = [{x: 10, y: 10}];
            direction = {x: 1, y: 0};
            nextDirection = {x: 1, y: 0};
            score = 0;
            scoreDisplay.textContent = score;
            generateFood();
            gameOverModal.classList.remove('show');
            overlay.classList.remove('show');
            clearInterval(gameLoop);
            draw();
            document.querySelector('button:nth-of-type(2)').textContent = 'Pause';
        }

        function endGame() {
            gameActive = false;
            clearInterval(gameLoop);

            if (score > highScore) {
                highScore = score;
                localStorage.setItem('snakeHighScore', highScore);
                highScoreDisplay.textContent = highScore;
            }

            document.getElementById('finalScore').textContent = score;
            document.getElementById('finalHighScore').textContent = highScore;
            gameOverModal.classList.add('show');
            overlay.classList.add('show');
        }

        // Initialize
        highScoreDisplay.textContent = highScore;
        draw();
    </script>
</body>
</html>
