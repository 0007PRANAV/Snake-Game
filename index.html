<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS SNAKE - Premium Arcade Masterpiece</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');

        body {
            width: 100%;
            height: 100vh;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f4b 50%, #0d1b3d 100%);
            font-family: 'Orbitron', 'Courier New', monospace;
            color: #0ff;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* BACKGROUND EFFECTS */
        .bg-stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #fff;
            border-radius: 50%;
            animation: twinkle 3s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        .grid-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(0deg, rgba(0, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: 0;
            animation: moveGrid 20s linear infinite;
        }

        @keyframes moveGrid {
            0% { transform: translateY(0); }
            100% { transform: translateY(50px); }
        }

        .scan-lines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.15),
                rgba(0, 0, 0, 0.15) 1px,
                transparent 1px,
                transparent 2px
            );
            pointer-events: none;
            z-index: 1;
            animation: scanFlicker 0.15s infinite;
        }

        @keyframes scanFlicker {
            0% { opacity: 0.03; }
            100% { opacity: 0.05; }
        }

        /* MAIN CONTAINER */
        .container {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* MENU SCREEN */
        .menu-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 40px;
            animation: fadeIn 0.8s ease-out;
            width: 100%;
        }

        @keyframes fadeIn {
            from { 
                opacity: 0;
                transform: translateY(30px);
            }
            to { 
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo-container {
            text-align: center;
            animation: logoGlow 3s ease-in-out infinite;
        }

        .logo {
            font-size: 5em;
            font-weight: 900;
            background: linear-gradient(135deg, #0ff, #0f0, #0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 6px;
            text-shadow: 0 0 30px rgba(0, 255, 255, 0.5);
            filter: drop-shadow(0 0 20px #0ff);
        }

        @keyframes logoGlow {
            0%, 100% { 
                filter: drop-shadow(0 0 20px #0ff) drop-shadow(0 0 40px #0f0);
            }
            50% { 
                filter: drop-shadow(0 0 40px #0ff) drop-shadow(0 0 80px #0f0);
            }
        }

        .tagline {
            font-size: 1.3em;
            background: linear-gradient(90deg, #0f0, #0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 3px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.8; }
            50% { opacity: 1; }
        }

        .menu-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 100%;
            max-width: 600px;
        }

        .menu-btn {
            padding: 15px 25px;
            font-size: 1.1em;
            background: linear-gradient(135deg, rgba(0, 255, 255, 0.2), rgba(0, 255, 0, 0.2));
            color: #0ff;
            border: 2px solid #0ff;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
            position: relative;
            overflow: hidden;
        }

        .menu-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s;
        }

        .menu-btn:hover::before {
            left: 100%;
        }

        .menu-btn:hover {
            background: linear-gradient(135deg, rgba(0, 255, 255, 0.4), rgba(0, 255, 0, 0.4));
            box-shadow: 0 0 25px #0ff, inset 0 0 20px rgba(0, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .menu-btn:active {
            transform: scale(0.95);
        }

        /* GAME SCREEN */
        .game-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            width: 100%;
            height: 100%;
            overflow-y: auto;
            animation: slideInUp 0.5s ease-out;
        }

        .game-screen.active {
            display: flex;
        }

        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .game-top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 900px;
            padding: 15px 20px;
            background: rgba(0, 255, 255, 0.08);
            border: 2px solid #0ff;
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }

        .difficulty-indicator {
            padding: 8px 15px;
            background: rgba(255, 100, 0, 0.3);
            border: 1px solid #ff6400;
            border-radius: 5px;
            color: #ffaa00;
            font-weight: bold;
            font-size: 0.9em;
        }

        .stats-container {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 15px;
            width: 100%;
            max-width: 900px;
            margin-bottom: 15px;
        }

        .stat-box {
            background: linear-gradient(135deg, rgba(0, 255, 255, 0.1), rgba(0, 255, 0, 0.1));
            padding: 15px;
            border: 1px solid #0ff;
            border-radius: 8px;
            text-align: center;
            transition: all 0.3s;
        }

        .stat-box:hover {
            background: linear-gradient(135deg, rgba(0, 255, 255, 0.2), rgba(0, 255, 0, 0.2));
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
            transform: translateY(-3px);
        }

        .stat-label {
            font-size: 0.7em;
            opacity: 0.7;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-value {
            font-size: 1.8em;
            color: #0f0;
            font-weight: bold;
            margin-top: 5px;
        }

        .stat-value.combo {
            color: #ffaa00;
        }

        .stat-value.multiplier {
            color: #ff00ff;
        }

        .game-canvas-wrapper {
            position: relative;
            background: #000;
            border: 3px solid #0ff;
            border-radius: 10px;
            box-shadow: 0 0 40px rgba(0, 255, 255, 0.4), inset 0 0 30px rgba(0, 255, 255, 0.1);
            overflow: hidden;
        }

        canvas {
            display: block;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f4b 100%);
        }

        .active-powerups {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            width: 100%;
            max-width: 900px;
            min-height: 30px;
        }

        .powerup-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 15px;
            background: rgba(255, 100, 200, 0.3);
            border: 1px solid #ff64c8;
            border-radius: 5px;
            font-size: 0.9em;
            animation: pulseBox 0.5s ease-in-out infinite;
        }

        @keyframes pulseBox {
            0%, 100% { box-shadow: 0 0 10px rgba(255, 100, 200, 0.5); }
            50% { box-shadow: 0 0 20px rgba(255, 100, 200, 0.8); }
        }

        .powerup-timer {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 2px solid #ff64c8;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8em;
            background: rgba(255, 100, 200, 0.5);
        }

        .game-controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
            max-width: 900px;
        }

        .control-btn {
            padding: 12px 25px;
            background: linear-gradient(135deg, rgba(0, 255, 255, 0.2), rgba(0, 255, 0, 0.2));
            border: 1px solid #0ff;
            color: #0ff;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.95em;
            position: relative;
            overflow: hidden;
        }

        .control-btn:hover {
            background: linear-gradient(135deg, rgba(0, 255, 255, 0.4), rgba(0, 255, 0, 0.4));
            box-shadow: 0 0 20px #0ff;
            transform: translateY(-2px);
        }

        .control-btn:active {
            transform: scale(0.98);
        }

        /* MOBILE CONTROLS */
        .mobile-controls {
            display: none;
            grid-template-columns: repeat(3, 70px);
            gap: 12px;
            justify-content: center;
            margin-top: 15px;
        }

        .mobile-controls.active {
            display: grid;
        }

        .arrow-btn {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, rgba(0, 255, 0, 0.3), rgba(0, 255, 0, 0.1));
            border: 2px solid #0f0;
            color: #0f0;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1.8em;
            font-weight: bold;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .arrow-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle, rgba(0, 255, 0, 0.4), transparent);
            opacity: 0;
            transition: opacity 0.2s;
            border-radius: 10px;
        }

        .arrow-btn:active::before {
            opacity: 1;
            animation: pulse 0.5s ease-out;
        }

        .arrow-btn:active {
            background: linear-gradient(135deg, rgba(0, 255, 0, 0.8), rgba(0, 255, 0, 0.5));
            box-shadow: 0 0 20px #0f0, inset 0 0 15px rgba(0, 255, 0, 0.4);
            transform: scale(0.95);
        }

        .arrow-btn:nth-child(1) { grid-column: 2; grid-row: 1; }
        .arrow-btn:nth-child(2) { grid-column: 1; grid-row: 2; }
        .arrow-btn:nth-child(3) { grid-column: 2; grid-row: 2; }
        .arrow-btn:nth-child(4) { grid-column: 3; grid-row: 2; }

        /* PAUSE MENU */
        .pause-menu {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, rgba(10, 14, 39, 0.95), rgba(26, 31, 75, 0.95));
            border: 3px solid #0ff;
            border-radius: 15px;
            padding: 40px;
            z-index: 1000;
            text-align: center;
            min-width: 350px;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 50px rgba(0, 255, 255, 0.5), inset 0 0 30px rgba(0, 255, 255, 0.1);
            animation: slideIn 0.3s ease-out;
        }

        .pause-menu.active {
            display: block;
        }

        .pause-menu h2 {
            font-size: 2.5em;
            color: #0f0;
            margin-bottom: 30px;
            text-shadow: 0 0 20px #0f0;
        }

        .pause-menu-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .pause-menu-btn {
            padding: 15px 30px;
            background: linear-gradient(135deg, rgba(0, 255, 255, 0.2), rgba(0, 255, 0, 0.2));
            border: 2px solid #0ff;
            color: #0ff;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            text-transform: uppercase;
            font-size: 1em;
        }

        .pause-menu-btn:hover {
            background: #0ff;
            color: #000;
            box-shadow: 0 0 25px #0ff;
            transform: translateX(5px);
        }

        /* GAME OVER SCREEN */
        .game-over-screen {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, rgba(10, 14, 39, 0.95), rgba(26, 31, 75, 0.95));
            border: 3px solid #0f0;
            border-radius: 15px;
            padding: 50px;
            z-index: 1000;
            text-align: center;
            min-width: 400px;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 60px rgba(0, 255, 0, 0.6), inset 0 0 30px rgba(0, 255, 0, 0.1);
            max-height: 90vh;
            overflow-y: auto;
            animation: slideIn 0.4s ease-out;
        }

        .game-over-screen.active {
            display: block;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.8);
            }
            to {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
        }

        .game-over-screen h2 {
            font-size: 3em;
            color: #0f0;
            margin-bottom: 20px;
            text-shadow: 0 0 30px #0f0;
            animation: bounce 0.6s ease-out;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .game-over-title {
            font-size: 2em;
            color: #0f0;
            margin-bottom: 20px;
        }

        .new-high-score {
            font-size: 1.5em;
            color: #ffaa00;
            font-weight: bold;
            margin-bottom: 15px;
            text-shadow: 0 0 20px #ffaa00;
            animation: pulse 1s ease-in-out infinite;
        }

        .game-over-stats {
            background: linear-gradient(135deg, rgba(0, 255, 0, 0.1), rgba(0, 255, 0, 0.05));
            padding: 25px;
            border-radius: 10px;
            margin-bottom: 25px;
            border: 2px solid #0f0;
        }

        .stat-line {
            font-size: 1.2em;
            color: #0ff;
            margin: 12px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .stat-line .label {
            text-align: left;
        }

        .stat-line .value {
            color: #0f0;
            font-weight: bold;
            font-size: 1.3em;
        }

        .achievements {
            background: rgba(255, 170, 0, 0.1);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid #ffaa00;
        }

        .achievement {
            color: #ffaa00;
            font-size: 0.9em;
            padding: 5px;
        }

        .game-over-buttons {
            display: flex;
            gap: 12px;
            flex-direction: column;
        }

        .game-over-btn {
            padding: 15px 30px;
            background: linear-gradient(135deg, #0f0 0%, #0ff 100%);
            color: #000;
            border: 2px solid #0ff;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            text-transform: uppercase;
            font-size: 1.05em;
        }

        .game-over-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 255, 0, 0.4);
        }

        .game-over-btn:active {
            transform: scale(0.98);
        }

        /* OVERLAY */
        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 999;
            backdrop-filter: blur(4px);
        }

        .overlay.active {
            display: block;
        }

        /* PARTICLES */
        .particle {
            position: fixed;
            pointer-events: none;
            font-weight: bold;
            z-index: 500;
            filter: drop-shadow(0 0 5px currentColor);
        }

        @keyframes float-up {
            0% {
                opacity: 1;
                transform: translateY(0) translateX(0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateY(-100px) translateX(20px) scale(0.5);
            }
        }

        .particle {
            animation: float-up 1s ease-out forwards;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .shake {
            animation: shake 0.3s ease-in-out;
        }

        /* RESPONSIVE */
        @media (max-width: 900px) {
            .logo {
                font-size: 3em;
            }

            .menu-buttons {
                grid-template-columns: 1fr;
            }

            .stats-container {
                grid-template-columns: repeat(3, 1fr);
            }

            canvas {
                max-width: 100%;
                height: auto;
            }

            .game-over-screen {
                min-width: 320px;
                padding: 30px;
            }
        }

        @media (max-width: 600px) {
            .logo {
                font-size: 2em;
            }

            .stat-box {
                padding: 10px;
            }

            .stat-value {
                font-size: 1.3em;
            }

            .game-over-screen {
                min-width: 280px;
                padding: 20px;
            }

            .game-over-screen h2 {
                font-size: 1.8em;
            }
        }
    </style>
</head>
<body>
    <div class="bg-stars" id="starfield"></div>
    <div class="grid-bg"></div>
    <div class="scan-lines"></div>

    <div class="container">
        <!-- MAIN MENU -->
        <div class="menu-screen" id="menuScreen">
            <div class="logo-container">
                <div class="logo">🐍 NEXUS</div>
                <div class="tagline">ULTIMATE ARCADE EXPERIENCE</div>
            </div>

            <div class="menu-buttons">
                <button class="menu-btn" onclick="startGame('easy')">
                    🐢 EASY<br><small style="font-size: 0.7em; opacity: 0.8;">Relaxed Pace</small>
                </button>
                <button class="menu-btn" onclick="startGame('normal')">
                    🐍 NORMAL<br><small style="font-size: 0.7em; opacity: 0.8;">Balanced</small>
                </button>
                <button class="menu-btn" onclick="startGame('hard')">
                    ⚡ HARD<br><small style="font-size: 0.7em; opacity: 0.8;">Challenging</small>
                </button>
                <button class="menu-btn" onclick="startGame('nightmare')">
                    💀 NIGHTMARE<br><small style="font-size: 0.7em; opacity: 0.8;">Extreme</small>
                </button>
            </div>
        </div>

        <!-- GAME SCREEN -->
        <div class="game-screen" id="gameScreen">
            <div class="game-top-bar">
                <div class="difficulty-indicator" id="difficultyDisplay">Easy</div>
                <button class="control-btn" style="flex: 0;" onclick="goToMenu()">🏠 MENU</button>
            </div>

            <div class="stats-container">
                <div class="stat-box">
                    <div class="stat-label">Score</div>
                    <div class="stat-value" id="scoreDisplay">0</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Level</div>
                    <div class="stat-value" id="levelDisplay">1</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Combo</div>
                    <div class="stat-value combo" id="comboDisplay">0x</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Multiplier</div>
                    <div class="stat-value multiplier" id="multiplierDisplay">1.0x</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">High Score</div>
                    <div class="stat-value" id="highScoreDisplay">0</div>
                </div>
            </div>

            <div class="game-canvas-wrapper">
                <canvas id="gameCanvas" width="600" height="400"></canvas>
            </div>

            <div class="active-powerups" id="activePowerups"></div>

            <div class="game-controls">
                <button class="control-btn" onclick="togglePause()">⏸ PAUSE</button>
                <button class="control-btn" onclick="toggleSound()" id="soundBtn">🔊 SOUND</button>
                <button class="control-btn" onclick="toggleMusic()" id="musicBtn">🎵 MUSIC</button>
            </div>

            <div class="mobile-controls" id="mobileControls">
                <button class="arrow-btn" onclick="mobileMove(0, -1)">⬆</button>
                <button class="arrow-btn" onclick="mobileMove(-1, 0)">⬅</button>
                <button class="arrow-btn" onclick="mobileMove(0, 1)">⬇</button>
                <button class="arrow-btn" onclick="mobileMove(1, 0)">➡</button>
            </div>
        </div>
    </div>

    <!-- PAUSE MENU -->
    <div class="overlay" id="pauseOverlay"></div>
    <div class="pause-menu" id="pauseMenu">
        <h2>⏸ PAUSED</h2>
        <div class="pause-menu-buttons">
            <button class="pause-menu-btn" onclick="togglePause()">▶ RESUME</button>
            <button class="pause-menu-btn" onclick="goToMenu()">🏠 MENU</button>
        </div>
    </div>

    <!-- GAME OVER SCREEN -->
    <div class="game-over-screen" id="gameOverScreen">
        <h2>GAME OVER</h2>
        <div id="gameOverContent"></div>
        <div class="game-over-buttons">
            <button class="game-over-btn" onclick="restartGame()">🔄 PLAY AGAIN</button>
            <button class="game-over-btn" onclick="goToMenu()">🏠 MAIN MENU</button>
        </div>
    </div>

    <script>
        // ==================== GAME STATE ====================
        const gameState = {
            difficulty: 'normal',
            score: 0,
            highScore: localStorage.getItem('snakeHighScore') || 0,
            level: 1,
            combo: 0,
            maxCombo: 0,
            foodEaten: 0,
            isPaused: false,
            isActive: false,
            soundEnabled: localStorage.getItem('soundEnabled') !== 'false',
            musicEnabled: localStorage.getItem('musicEnabled') !== 'false',
            snake: [{x: 10, y: 8}],
            food: {x: 15, y: 8},
            direction: {x: 1, y: 0},
            nextDirection: {x: 1, y: 0},
            obstacles: [],
            powerUps: [],
            activePowerUps: {},
            achievements: [],
        };

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const GRID_SIZE = 20;
        const COLS = Math.floor(canvas.width / GRID_SIZE);
        const ROWS = Math.floor(canvas.height / GRID_SIZE);
        let gameLoopId;
        let difficultySettings = {
            easy: { speed: 150, obstacleChance: 0.3, powerUpChance: 0.15 },
            normal: { speed: 100, obstacleChance: 0.5, powerUpChance: 0.2 },
            hard: { speed: 70, obstacleChance: 0.7, powerUpChance: 0.25 },
            nightmare: { speed: 40, obstacleChance: 0.9, powerUpChance: 0.3 }
        };

        // ==================== INITIALIZATION ====================
        function initStarfield() {
            const starfield = document.getElementById('starfield');
            for (let i = 0; i < 150; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.width = Math.random() * 3 + 'px';
                star.style.height = star.style.width;
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 3 + 's';
                starfield.appendChild(star);
            }
        }

        initStarfield();

        function isMobile() {
            return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        }

        if (isMobile()) {
            document.getElementById('mobileControls').classList.add('active');
        }

        // ==================== GAME START ====================
        function startGame(difficulty) {
            gameState.difficulty = difficulty;
            resetGameState();
            showGameScreen();
            gameState.isActive = true;
            
            const settings = difficultySettings[difficulty];
            gameLoopId = setInterval(gameLoop, settings.speed);
            updateDifficultyDisplay();
        }

        function resetGameState() {
            gameState.snake = [{x: Math.floor(COLS/2), y: Math.floor(ROWS/2)}];
            gameState.direction = {x: 1, y: 0};
            gameState.nextDirection = {x: 1, y: 0};
            gameState.score = 0;
            gameState.level = 1;
            gameState.combo = 0;
            gameState.foodEaten = 0;
            gameState.isPaused = false;
            gameState.obstacles = [];
            gameState.powerUps = [];
            gameState.activePowerUps = {};
            gameState.achievements = [];
            generateFood();
            updateUI();
        }

        function updateDifficultyDisplay() {
            const names = { easy: '🐢 EASY', normal: '🐍 NORMAL', hard: '⚡ HARD', nightmare: '💀 NIGHTMARE' };
            document.getElementById('difficultyDisplay').textContent = names[gameState.difficulty];
        }

        // ==================== UI FUNCTIONS ====================
        function showGameScreen() {
            document.getElementById('menuScreen').style.display = 'none';
            document.getElementById('gameScreen').classList.add('active');
        }

        function goToMenu() {
            gameState.isActive = false;
            clearInterval(gameLoopId);
            document.getElementById('gameScreen').classList.remove('active');
            document.getElementById('menuScreen').style.display = 'flex';
            document.getElementById('pauseMenu').classList.remove('active');
            document.getElementById('pauseOverlay').classList.remove('active');
            document.getElementById('gameOverScreen').classList.remove('active');
        }

        function togglePause() {
            if (!gameState.isActive) return;
            gameState.isPaused = !gameState.isPaused;
            document.getElementById('pauseMenu').classList.toggle('active');
            document.getElementById('pauseOverlay').classList.toggle('active');
        }

        function toggleSound() {
            gameState.soundEnabled = !gameState.soundEnabled;
            localStorage.setItem('soundEnabled', gameState.soundEnabled);
            document.getElementById('soundBtn').textContent = gameState.soundEnabled ? '🔊 SOUND' : '🔇 MUTE';
        }

        function toggleMusic() {
            gameState.musicEnabled = !gameState.musicEnabled;
            localStorage.setItem('musicEnabled', gameState.musicEnabled);
            document.getElementById('musicBtn').textContent = gameState.musicEnabled ? '🎵 MUSIC' : '🎵 OFF';
        }

        function updateUI() {
            document.getElementById('scoreDisplay').textContent = gameState.score;
            document.getElementById('levelDisplay').textContent = gameState.level;
            document.getElementById('comboDisplay').textContent = gameState.combo + 'x';
            document.getElementById('highScoreDisplay').textContent = gameState.highScore;
            
            const multiplier = (1 + gameState.level * 0.1 * (1 + gameState.combo * 0.05)).toFixed(1);
            document.getElementById('multiplierDisplay').textContent = multiplier + 'x';
            
            updatePowerUpDisplay();
        }

        function updatePowerUpDisplay() {
            const container = document.getElementById('activePowerups');
            container.innerHTML = '';
            
            for (const [type, data] of Object.entries(gameState.activePowerUps)) {
                const remaining = Math.ceil((data.endTime - Date.now()) / 1000);
                if (remaining > 0) {
                    const powerUpNames = {
                        speedBoost: '⚡ SPEED',
                        shield: '🛡️ SHIELD',
                        doubleScore: '2x SCORE',
                        ghostMode: '👻 GHOST',
                        magnet: '🧲 MAGNET'
                    };
                    
                    const div = document.createElement('div');
                    div.className = 'powerup-indicator';
                    div.innerHTML = `${powerUpNames[type]} <span class="powerup-timer">${remaining}</span>`;
                    container.appendChild(div);
                }
            }
        }

        function showGameOver() {
            gameState.isActive = false;
            clearInterval(gameLoopId);
            
            checkAchievements();
            
            let html = `<div class="game-over-title">FINAL STATS</div>`;
            
            if (gameState.score > gameState.highScore) {
                gameState.highScore = gameState.score;
                localStorage.setItem('snakeHighScore', gameState.highScore);
                html += `<div class="new-high-score">🏆 NEW HIGH SCORE! 🏆</div>`;
            }
            
            html += `
                <div class="game-over-stats">
                    <div class="stat-line">
                        <span class="label">Final Score:</span>
                        <span class="value">${gameState.score}</span>
                    </div>
                    <div class="stat-line">
                        <span class="label">Level Reached:</span>
                        <span class="value">${gameState.level}</span>
                    </div>
                    <div class="stat-line">
                        <span class="label">Food Eaten:</span>
                        <span class="value">${gameState.foodEaten}</span>
                    </div>
                    <div class="stat-line">
                        <span class="label">Max Combo:</span>
                        <span class="value">${gameState.maxCombo}x</span>
                    </div>
                    <div class="stat-line">
                        <span class="label">High Score:</span>
                        <span class="value">${gameState.highScore}</span>
                    </div>
                </div>
            `;
            
            if (gameState.achievements.length > 0) {
                html += `<div class="achievements">
                    <div style="font-weight: bold; margin-bottom: 10px;">🎖️ ACHIEVEMENTS</div>
                    ${gameState.achievements.map(a => `<div class="achievement">✓ ${a}</div>`).join('')}
                </div>`;
            }
            
            document.getElementById('gameOverContent').innerHTML = html;
            document.getElementById('gameOverScreen').classList.add('active');
            playSound('gameover');
        }

        function restartGame() {
            document.getElementById('gameOverScreen').classList.remove('active');
            startGame(gameState.difficulty);
        }

        // ==================== GAME LOGIC ====================
        function generateFood() {
            let food;
            do {
                food = {
                    x: Math.floor(Math.random() * COLS),
                    y: Math.floor(Math.random() * ROWS),
                    type: Math.random() < 0.1 ? 'golden' : 'normal'
                };
            } while (
                gameState.snake.some(s => s.x === food.x && s.y === food.y) ||
                gameState.obstacles.some(o => o.x === food.x && o.y === food.y)
            );
            gameState.food = food;
        }

        function addObstacle() {
            if (gameState.obstacles.length < Math.min(gameState.level, 8)) {
                let obs;
                do {
                    obs = {
                        x: Math.floor(Math.random() * COLS),
                        y: Math.floor(Math.random() * ROWS)
                    };
                } while (
                    gameState.snake.some(s => s.x === obs.x && s.y === obs.y) ||
                    (gameState.food.x === obs.x && gameState.food.y === obs.y)
                );
                gameState.obstacles.push(obs);
            }
        }

        function spawnPowerUp() {
            if (Math.random() > difficultySettings[gameState.difficulty].powerUpChance) return;
            
            const types = ['speedBoost', 'shield', 'doubleScore', 'ghostMode', 'magnet'];
            let pu;
            do {
                pu = {
                    x: Math.floor(Math.random() * COLS),
                    y: Math.floor(Math.random() * ROWS),
                    type: types[Math.floor(Math.random() * types.length)]
                };
            } while (
                gameState.snake.some(s => s.x === pu.x && s.y === pu.y) ||
                gameState.obstacles.some(o => o.x === pu.x && o.y === pu.y)
            );
            gameState.powerUps.push(pu);
        }

        function activatePowerUp(type) {
            const duration = 10000; // 10 seconds
            gameState.activePowerUps[type] = { endTime: Date.now() + duration };
            playSound('powerup');
            createParticle(gameState.snake[0].x * GRID_SIZE, gameState.snake[0].y * GRID_SIZE, '⭐ POWER UP!', '#ff00ff');
        }

        function update() {
            if (gameState.isPaused || !gameState.isActive) return;

            // Update power ups
            for (const [type, data] of Object.entries(gameState.activePowerUps)) {
                if (data.endTime < Date.now()) {
                    delete gameState.activePowerUps[type];
                }
            }

            gameState.direction = gameState.nextDirection;
            const head = {
                x: gameState.snake[0].x + gameState.direction.x,
                y: gameState.snake[0].y + gameState.direction.y
            };

            // Wrap around edges
            head.x = (head.x + COLS) % COLS;
            head.y = (head.y + ROWS) % ROWS;

            // Check self collision
            if (gameState.snake.some((s, i) => i !== 0 && s.x === head.x && s.y === head.y)) {
                showGameOver();
                return;
            }

            // Check obstacle collision
            if (!gameState.activePowerUps.ghostMode && gameState.obstacles.some(o => o.x === head.x && o.y === head.y)) {
                if (!gameState.activePowerUps.shield) {
                    showGameOver();
                    return;
                } else {
                    delete gameState.activePowerUps.shield;
                    playSound('hit');
                }
            }

            gameState.snake.unshift(head);

            // Check food collision
            if (head.x === gameState.food.x && head.y === gameState.food.y) {
                gameState.combo++;
                let points = gameState.level * 10 * gameState.combo;
                if (gameState.food.type === 'golden') points *= 5;
                if (gameState.activePowerUps.doubleScore) points *= 2;
                
                gameState.score += points;
                gameState.foodEaten++;
                gameState.maxCombo = Math.max(gameState.maxCombo, gameState.combo);
                
                playSound('eat');
                createParticle(gameState.food.x * GRID_SIZE, gameState.food.y * GRID_SIZE, '+' + points, '#0f0');

                if (gameState.foodEaten % 5 === 0) {
                    gameState.level++;
                    createParticle(COLS/2 * GRID_SIZE, ROWS/2 * GRID_SIZE, '⭐ LEVEL ' + gameState.level, '#ffaa00');
                }

                if (gameState.foodEaten % 3 === 0 && Math.random() < difficultySettings[gameState.difficulty].obstacleChance) {
                    addObstacle();
                }

                if (gameState.foodEaten % 7 === 0) {
                    spawnPowerUp();
                }

                generateFood();
            } else {
                gameState.combo = 0;
                gameState.snake.pop();
            }

            // Check power up collision
            const collidedPowerUp = gameState.powerUps.find(pu => pu.x === head.x && pu.y === head.y);
            if (collidedPowerUp) {
                activatePowerUp(collidedPowerUp.type);
                gameState.powerUps = gameState.powerUps.filter(pu => pu !== collidedPowerUp);
            }

            updateUI();
        }

        function draw() {
            const gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
            gradient.addColorStop(0, '#0a0e27');
            gradient.addColorStop(1, '#1a1f4b');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Grid
            ctx.strokeStyle = 'rgba(0, 255, 255, 0.05)';
            ctx.lineWidth = 0.5;
            for (let i = 0; i <= COLS; i++) {
                ctx.beginPath();
                ctx.moveTo(i * GRID_SIZE, 0);
                ctx.lineTo(i * GRID_SIZE, canvas.height);
                ctx.stroke();
            }
            for (let i = 0; i <= ROWS; i++) {
                ctx.beginPath();
                ctx.moveTo(0, i * GRID_SIZE);
                ctx.lineTo(canvas.width, i * GRID_SIZE);
                ctx.stroke();
            }

            // Obstacles
            gameState.obstacles.forEach(obs => {
                ctx.fillStyle = '#ff0055';
                ctx.shadowColor = 'rgba(255, 0, 85, 0.8)';
                ctx.shadowBlur = 12;
                ctx.beginPath();
                ctx.rect(obs.x * GRID_SIZE + 2, obs.y * GRID_SIZE + 2, GRID_SIZE - 4, GRID_SIZE - 4);
                ctx.fill();
                ctx.shadowColor = 'transparent';
            });

            // Power ups
            gameState.powerUps.forEach(pu => {
                const icons = { speedBoost: '⚡', shield: '🛡️', doubleScore: '2️⃣', ghostMode: '👻', magnet: '🧲' };
                ctx.font = 'bold 16px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(icons[pu.type], pu.x * GRID_SIZE + GRID_SIZE/2, pu.y * GRID_SIZE + GRID_SIZE/2);
            });

            // Snake
            gameState.snake.forEach((segment, i) => {
                if (i === 0) {
                    // Head with glow
                    ctx.fillStyle = gameState.activePowerUps.ghostMode ? 'rgba(138, 43, 226, 0.7)' : '#00ff88';
                    ctx.shadowColor = gameState.activePowerUps.ghostMode ? 'rgba(138, 43, 226, 0.8)' : 'rgba(0, 255, 136, 0.8)';
                    ctx.shadowBlur = 20;
                    ctx.beginPath();
                    ctx.arc(segment.x * GRID_SIZE + GRID_SIZE/2, segment.y * GRID_SIZE + GRID_SIZE/2, GRID_SIZE/2 - 1, 0, Math.PI * 2);
                    ctx.fill();
                    
                    // Eyes
                    ctx.fillStyle = '#000';
                    ctx.beginPath();
                    ctx.arc(segment.x * GRID_SIZE + GRID_SIZE/2 - 5, segment.y * GRID_SIZE + GRID_SIZE/2 - 5, 2.5, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(segment.x * GRID_SIZE + GRID_SIZE/2 + 5, segment.y * GRID_SIZE + GRID_SIZE/2 - 5, 2.5, 0, Math.PI * 2);
                    ctx.fill();
                } else {
                    // Body segments
                    const alpha = Math.max(0.3, 1 - i / gameState.snake.length);
                    ctx.fillStyle = `rgba(0, 204, 136, ${alpha})`;
                    ctx.shadowColor = `rgba(0, 255, 136, ${alpha * 0.8})`;
                    ctx.shadowBlur = 10;
                    ctx.fillRect(segment.x * GRID_SIZE + 1, segment.y * GRID_SIZE + 1, GRID_SIZE - 2, GRID_SIZE - 2);
                }
            });

            ctx.shadowColor = 'transparent';

            // Food
            const pulse = Math.sin(Date.now() / 150) * 0.4 + 0.6;
            if (gameState.food.type === 'golden') {
                ctx.fillStyle = `rgba(255, 215, 0, ${pulse})`;
                ctx.shadowColor = 'rgba(255, 215, 0, 1)';
            } else {
                ctx.fillStyle = `rgba(255, 100, 200, ${pulse})`;
                ctx.shadowColor = 'rgba(255, 100, 200, 1)';
            }
            ctx.shadowBlur = 15;
            ctx.beginPath();
            ctx.arc(gameState.food.x * GRID_SIZE + GRID_SIZE/2, gameState.food.y * GRID_SIZE + GRID_SIZE/2, (GRID_SIZE/2 - 2) * pulse, 0, Math.PI * 2);
            ctx.fill();

            ctx.strokeStyle = gameState.food.type === 'golden' ? '#ffd700' : '#ff64c8';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(gameState.food.x * GRID_SIZE + GRID_SIZE/2, gameState.food.y * GRID_SIZE + GRID_SIZE/2, GRID_SIZE/2, 0, Math.PI * 2);
            ctx.stroke();
            ctx.shadowColor = 'transparent';

            // Pause overlay
            if (gameState.isPaused) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }
        }

        function createParticle(x, y, text, color = '#0ff') {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.textContent = text;
            particle.style.left = x + 'px';
            particle.style.top = y + 'px';
            particle.style.color = color;
            particle.style.fontSize = text.includes('LEVEL') ? '1.8em' : '1.2em';
            document.body.appendChild(particle);
            setTimeout(() => particle.remove(), 1000);
        }

        function checkAchievements() {
            const achievements = [];
            if (gameState.foodEaten >= 10) achievements.push('10 FOOD EATEN');
            if (gameState.foodEaten >= 25) achievements.push('FEEDING FRENZY');
            if (gameState.foodEaten >= 50) achievements.push('INSATIABLE');
            if (gameState.maxCombo >= 5) achievements.push('5x COMBO');
            if (gameState.maxCombo >= 10) achievements.push('10x COMBO MASTER');
            if (gameState.level >= 5) achievements.push('LEVEL 5 REACHED');
            if (gameState.level >= 10) achievements.push('LEVEL 10 REACHED');
            if (gameState.score >= 1000) achievements.push('1000 SCORE');
            if (gameState.score >= 5000) achievements.push('5000 SCORE');
            if (gameState.difficulty === 'nightmare') achievements.push('NIGHTMARE SURVIVOR');
            
            gameState.achievements = achievements;
        }

        // ==================== INPUT HANDLING ====================
        function mobileMove(dx, dy) {
            if (gameState.direction.x * dx + gameState.direction.y * dy !== -1) {
                gameState.nextDirection = {x: dx, y: dy};
            }
        }

        document.addEventListener('keydown', (e) => {
            if (!gameState.isActive) return;

            if (e.key === ' ') {
                e.preventDefault();
                togglePause();
                return;
            }

            const key = e.key.toLowerCase();
            switch(key) {
                case 'arrowup':
                case 'w':
                    if (gameState.direction.y === 0) gameState.nextDirection = {x: 0, y: -1};
                    e.preventDefault();
                    break;
                case 'arrowdown':
                case 's':
                    if (gameState.direction.y === 0) gameState.nextDirection = {x: 0, y: 1};
                    e.preventDefault();
                    break;
                case 'arrowleft':
                case 'a':
                    if (gameState.direction.x === 0) gameState.nextDirection = {x: -1, y: 0};
                    e.preventDefault();
                    break;
                case 'arrowright':
                case 'd':
                    if (gameState.direction.x === 0) gameState.nextDirection = {x: 1, y: 0};
                    e.preventDefault();
                    break;
            }
        });

        // ==================== SOUND ====================
        function playSound(type) {
            if (!gameState.soundEnabled) return;
            
            try {
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);
                
                const sounds = {
                    eat: { freq: 800, duration: 0.1, gain: 0.3 },
                    powerup: { freq: 1200, duration: 0.2, gain: 0.3 },
                    hit: { freq: 400, duration: 0.2, gain: 0.2 },
                    gameover: { freq: 200, duration: 0.5, gain: 0.3 }
                };
                
                const sound = sounds[type];
                if (sound) {
                    oscillator.frequency.value = sound.freq;
                    gainNode.gain.setValueAtTime(sound.gain, audioContext.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + sound.duration);
                    oscillator.start(audioContext.currentTime);
                    oscillator.stop(audioContext.currentTime + sound.duration);
                }
            } catch (e) {}
        }

        // ==================== GAME LOOP ====================
        function gameLoop() {
            update();
            draw();
        }

        // Initialize
        document.getElementById('highScoreDisplay').textContent = gameState.highScore;
        document.getElementById('soundBtn').textContent = gameState.soundEnabled ? '🔊 SOUND' : '🔇 MUTE';
        document.getElementById('musicBtn').textContent = gameState.musicEnabled ? '🎵 MUSIC' : '🎵 OFF';
    </script>
</body>
</html>
